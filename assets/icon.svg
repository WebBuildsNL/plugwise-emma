<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer circle (thermostat body) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#000" stroke-width="24"/>
  <!-- Inner circle (display area) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#000" stroke-width="16"/>
  <!-- Temperature tick marks around the dial -->
  <!-- Bottom left to top -->
  <line x1="96" y1="380" x2="120" y2="360" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="56" y1="300" x2="84" y2="292" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="48" y1="210" x2="76" y2="214" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="76" y1="130" x2="100" y2="144" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="130" y1="76" x2="148" y2="98" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="208" y1="48" x2="216" y2="74" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <!-- Top center -->
  <line x1="256" y1="40" x2="256" y2="68" stroke="#000" stroke-width="14" stroke-linecap="round"/>
  <!-- Top to bottom right -->
  <line x1="304" y1="48" x2="296" y2="74" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="382" y1="76" x2="364" y2="98" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="436" y1="130" x2="412" y2="144" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="464" y1="210" x2="436" y2="214" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="456" y1="300" x2="428" y2="292" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="416" y1="380" x2="392" y2="360" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <!-- Temperature display text -->
  <text x="256" y="245" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="100" font-weight="bold" fill="#000">20</text>
  <text x="256" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="36" fill="#000" opacity="0.6">&#xB0;C</text>
  <!-- Small indicator dot at current position -->
  <circle cx="100" cy="375" r="10" fill="#000"/>
</svg>
